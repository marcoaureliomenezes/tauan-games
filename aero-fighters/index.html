<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aero Strike — F-35 Ground Strike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      color: white;
      font-family: monospace;
      font-size: 14px;
      padding: 8px;
      text-shadow: 1px 1px 2px #000;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }
    #mission { color: #ffcc44; font-weight: bold; letter-spacing: 1px; }
    #targets { color: #ff8844; }
    #sound-toggle {
      pointer-events: auto;
      margin-left: auto;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #888;
      font-family: monospace;
      font-size: 13px;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 3px;
    }
    #sound-toggle:hover { background: rgba(40,40,40,0.85); border-color: #ccc; }
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: monospace;
      font-size: 28px;
      text-align: center;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      z-index: 20;
      padding: 20px;
      white-space: pre-line;
    }
    #overlay.visible { display: flex; }
    #overlay .sub { font-size: 14px; margin-top: 14px; opacity: 0.85; line-height: 1.8; }
    #lives { color: #ff5560; font-size: 18px; }
    #stall-warn { color: #ff4400; font-weight: bold; display: none; animation: blink 0.4s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    #nuke-flash {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 100;
    }
  </style>
</head>
<body>
  <div id="hud">
    <span id="mission">MISSÃO 1</span>
    <span id="lives">&#9829;&#9829;&#9829;</span>
    <span id="damage-bar" style="color:#44ff88;font-size:16px;letter-spacing:2px">&#9632;&#9632;&#9632;</span>
    <span id="score">SCORE: 000000</span>
    <span id="missiles">MSLS: 100</span>
    <span id="heavy-missiles">HVY: 10</span>
    <span id="nuclear-missiles" style="color:#00ff44">&#9762; NUK: 3</span>
    <span id="speed">SPD: 0</span>
    <span id="throttle">THR: 50%</span>
    <span id="altitude">ALT: 0m</span>
    <span id="targets">ALVOS: 0/0</span>
    <span id="stall-warn">&#9888; STALL</span>
    <button id="sound-toggle" type="button">&#128266; SOM</button>
  </div>
  <div id="map-select" style="position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;
    justify-content:center;z-index:30;color:white;font-family:monospace;">
    <h2 style="color:#00aaff;letter-spacing:4px;margin-bottom:16px;font-size:28px">AERO STRIKE</h2>
    <p style="color:#aaa;margin-bottom:28px;letter-spacing:2px;font-size:13px">SELECIONE O TEATRO DE OPERAÇÕES</p>
    <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center">
      <button onclick="window.selectMap('islands')"
        style="background:#111;border:1px solid #0af;color:#0af;padding:14px 28px;cursor:pointer;font-size:14px;letter-spacing:2px;font-family:monospace">
        MAR DO SUL
      </button>
      <button onclick="window.selectMap('desert')"
        style="background:#111;border:1px solid #0af;color:#0af;padding:14px 28px;cursor:pointer;font-size:14px;letter-spacing:2px;font-family:monospace">
        DESERTO
      </button>
      <button onclick="window.selectMap('rio')"
        style="background:#111;border:1px solid #0af;color:#0af;padding:14px 28px;cursor:pointer;font-size:14px;letter-spacing:2px;font-family:monospace">
        RIO DE JANEIRO
      </button>
    </div>
  </div>
  <div id="overlay"></div>
  <div id="nuke-flash"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
