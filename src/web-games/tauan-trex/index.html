<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tauan T-Rex</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      transition: background 0.5s ease;
      font-family: 'Courier New', Courier, monospace;
    }

    body.night {
      background: #1a1a2e;
    }

    #game-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 12px;
      box-sizing: border-box;
    }

    #game-container {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    #game-container canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    #score-panel {
      position: absolute;
      top: 8px;
      right: 12px;
      text-align: right;
      color: #535353;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 5;
    }

    body.night #score-panel {
      color: #f7f7f7;
    }

    #score, #hi-score {
      font-family: 'Courier New', Courier, monospace;
    }

    #hi-score {
      opacity: 0.7;
      margin-top: 2px;
    }

    #game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #535353;
      font-weight: bold;
      font-size: 28px;
      letter-spacing: 3px;
      text-align: center;
      pointer-events: none;
      background: rgba(255,255,255,0.0);
      z-index: 10;
    }

    body.night #game-over-overlay {
      color: #f7f7f7;
    }

    #game-over-overlay.visible {
      display: flex;
    }

    #game-over-overlay .sub {
      font-size: 14px;
      letter-spacing: 2px;
      margin-top: 12px;
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      #game-container {
        width: 100%;
      }
      #score-panel {
        font-size: 14px;
      }
      #game-over-overlay {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="game-container">
      <div id="score-panel">
        <div id="score">SCORE: 00000</div>
        <div id="hi-score">HI: 00000</div>
      </div>
      <div id="game-over-overlay">
        <div>GAME OVER</div>
        <div class="sub">PRESSIONE ESPACO PARA REINICIAR</div>
      </div>
    </div>
  </div>

  <script src="../../../vendor/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
