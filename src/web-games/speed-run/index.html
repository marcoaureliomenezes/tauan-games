<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cruis'n Tauan — Corrida</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8F%8E%3C/text%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #10141c; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #menu {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; background: linear-gradient(180deg, #101a2eee, #1a1024ee);
      color: #e8e8f0; z-index: 10;
    }
    #menu h1 { font-size: 44px; color: #ffd24a; text-shadow: 0 3px 0 #7a3010; letter-spacing: 3px; }
    #menu .tag { color: #9ab0d0; margin-bottom: 8px; }
    .row { display: flex; gap: 12px; max-width: 96vw; flex-wrap: wrap; justify-content: center; }
    .rowLabel { color: #ffd24a; font-weight: bold; margin-top: 6px; }
    .opt {
      width: 240px; padding: 10px 12px; border: 2px solid #33415c; border-radius: 10px;
      background: #16203280; display: flex; flex-direction: column; gap: 4px; opacity: 0.55;
    }
    .opt b { color: #fff; font-size: 14px; }
    .opt span { font-size: 11px; color: #aab8cc; }
    .opt .stats { color: #7fd0a0; }
    .opt.sel { opacity: 1; border-color: #7a8fbc; }
    .opt.focus { border-color: #ffd24a; box-shadow: 0 0 14px #ffd24a55; }
    #menu .help { color: #8fa0b8; font-size: 13px; margin-top: 10px; }
    #hud { position: fixed; inset: 0; display: none; pointer-events: none; z-index: 5; color: #fff; }
    #hud .tl { position: absolute; top: 12px; left: 16px; font-weight: bold; text-shadow: 0 2px 3px #000; }
    #hud .tr { position: absolute; top: 12px; right: 16px; text-align: right; text-shadow: 0 2px 3px #000; }
    #speed { position: absolute; bottom: 18px; right: 22px; font-size: 42px; font-weight: bold; color: #ffd24a; text-shadow: 0 3px 4px #000; }
    #surface { position: absolute; bottom: 70px; right: 22px; font-size: 16px; color: #ffb060; text-shadow: 0 2px 3px #000; }
    #count {
      position: absolute; top: 30%; left: 0; right: 0; text-align: center; font-size: 110px;
      font-weight: bold; color: #ffd24a; text-shadow: 0 6px 0 #7a3010; display: none;
    }
    #finish {
      position: fixed; inset: 0; display: none; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; background: #000a; color: #fff; z-index: 9;
    }
    #finishTitle { font-size: 54px; color: #ffd24a; text-shadow: 0 4px 0 #7a3010; }
    #finishSub { color: #b8c8e0; }
    #finish .help { color: #8fa0b8; margin-top: 14px; }
  </style>
</head>
<body>
  <div id="menu">
    <h1>CRUIS'N TAUAN</h1>
    <div class="tag">corrida arcade — inspirado no Cruis'n World (N64)</div>
    <div class="rowLabel">PISTA</div>
    <div class="row" id="menuTracks"></div>
    <div class="rowLabel">CARRO</div>
    <div class="row" id="menuCars"></div>
    <div class="help">← → escolhe · ↑ ↓ muda linha · [Enter] CORRER · W/S acelera/freia · A/D vira · R reinicia</div>
  </div>
  <div id="hud">
    <div class="tl"><span id="trackName"></span><br><span id="lap"></span> · <span id="pos"></span></div>
    <div class="tr"><span id="time"></span></div>
    <div id="surface"></div>
    <div id="speed"></div>
    <div id="count"></div>
  </div>
  <div id="finish">
    <div id="finishTitle"></div>
    <div id="finishSub"></div>
    <div class="help">[Enter] voltar ao menu</div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
