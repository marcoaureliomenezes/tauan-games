<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Corrida</title>
  <link rel="icon" href="data:," />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #17324d;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    #game-wrapper {
      width: 100%;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 12px;
    }

    #game-container {
      position: relative;
      width: min(100%, 960px);
      aspect-ratio: 4 / 3;
      line-height: 0;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      background: #244f2f;
    }

    #game-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 720px) {
      #game-wrapper {
        padding: 0;
        align-items: flex-start;
      }

      #game-container {
        width: 100%;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="game-container" aria-label="Jogo Corrida"></div>
  </div>

  <script src="../vendor/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
